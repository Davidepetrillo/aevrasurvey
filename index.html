<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aevra</title>
  <meta name="description" content="Help shape Aevra." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <img class="brand" src="logo.png" alt="Aevra" />

  <div class="controls">
    <div class="lang" id="langToggle"></div>
    <button class="ctl restart" id="restartBtn" type="button" aria-label="Restart"></button>
    <button class="ctl sound" id="soundBtn" type="button" aria-label="Audio"></button>
  </div>

  <main id="stage" class="stage" aria-live="polite"></main>

  <footer class="foot">
    <button class="nav" id="backBtn" aria-label="Indietro">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <div class="foot__center">
      <div class="dots" id="dots" aria-label="Avanzamento"></div>
    </div>

    <button class="nav" id="fwdBtn" aria-label="Avanti">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </footer>

  <template id="tpl-survey"></template>

  <script src="app.js"></script>
</body>
</html>
